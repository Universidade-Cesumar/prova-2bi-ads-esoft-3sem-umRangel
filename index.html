<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
    <title>Almoxarifado</title>
</head>
<body>
    <main>
        <h1>Controle de Almoxarifado</h1>
        <form action="" id="formulario">
            <input type="text" id="input-nome" placeholder="Digite o material">
            <input type="number" id="input-quantidade" placeholder="Digite a quantidade">
            <button type="submit" id="btn-cadastrar">Cadastrar Material</button>
        </form>
        <table>
          <thead>
            <tr>
              <th>Material</th>
              <th>Quantidades</th>
            </tr>
          </thead>
          <tbody id="lista-materiais"></tbody>
        </table>
    </main>
    <script src="main.js"></script>
</body>
</html>
