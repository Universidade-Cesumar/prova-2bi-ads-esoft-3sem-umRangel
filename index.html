<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
    <title>Almoxarifado</title>
</head>
<body>
    <main>
        <h1>Controle de Almoxarifado</h1>
        
        <form action="" id="formulario">
            <input type="text" id="input-nome" placeholder="Digite o material" required>

            <input type="number" id="input-quantidade" placeholder="Digite a quantidade" min="1" required>

            <input type="number" id="input-retirada" placeholder="Quantidade para baixar">
            
            <button type="submit" id="btn-cadastrar">Cadastrar Material</button>
        </form>
        
        <div>
          <input type="text" id="input-busca" placeholder="Buscar material...">
          <p>Total de itens cadastrados: <span id="total-itens">0</span></p>
        </div>
        
        <table>
          <thead>
            <tr>
              <th>Material</th>
              <th>Quantidades</th>
              <th>Ações</th>
            </tr>
          </thead>
          <tbody id="lista-materiais"></tbody>
        </table>
    </main>
    
    <script src="main.js"></script>
</body>
</html>
